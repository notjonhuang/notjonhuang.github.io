<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rides</title>
  <link rel="stylesheet" href="dist/app.css" />
  <style>
    :root {
      --bg: #05070d;
      --ink: #cfd8e3;
      --dim: #5a6a80;
      --accent: #22e6c8;
      --line: #1d2836;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--ink);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      overflow: hidden; }
    #stage { display: grid; grid-template-columns: 1fr; height: 100%; }
    #globe-pane { position: relative; height: 100%; overflow: hidden; }
    #viewer-pane { display: none; position: relative; height: 100%; }
    #stage.ride #viewer-pane { display: block; }
    #viewer { position: absolute; inset: 0; }

    header { position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: baseline; gap: 1rem; padding: 1.1rem 1.4rem;
      pointer-events: none; }
    header h1 { font-size: .85rem; font-weight: 500; letter-spacing: .45em;
      text-transform: uppercase; color: var(--ink); }
    header .sub { font-size: .7rem; color: var(--dim); letter-spacing: .12em; }
    #stage.ride header { display: none; }

    /* ---------------- top-right nav: back-to-world + all-rides menu ------- */
    #nav-cluster { position: absolute; top: 1rem; right: 1.2rem; z-index: 12;
      display: flex; gap: .5rem; }
    #stage.ride #nav-cluster { display: none; }
    #nav-cluster button { background: rgba(5, 7, 13, .6); border: 1px solid var(--line);
      color: var(--dim); font: inherit; font-size: .7rem; letter-spacing: .2em;
      padding: .45rem .9rem; cursor: pointer; text-transform: uppercase; }
    #nav-cluster button:hover { color: var(--accent); border-color: var(--accent); }
    #rides-menu { position: absolute; top: 3.4rem; right: 1.2rem; z-index: 12;
      background: rgba(5, 7, 13, .94); border: 1px solid var(--line);
      min-width: 17rem; max-height: 70%; overflow-y: auto; }
    #stage.ride #rides-menu { display: none; }
    #rides-menu button { display: flex; justify-content: space-between; gap: 1.2rem;
      width: 100%; background: none; border: none; border-bottom: 1px solid #10161f;
      color: var(--ink); font: inherit; font-size: .72rem; letter-spacing: .08em;
      padding: .55rem .8rem; cursor: pointer; text-align: left;
      font-variant-numeric: tabular-nums; }
    #rides-menu button .dur { color: var(--dim); }
    #rides-menu button.city { color: var(--dim); text-transform: uppercase;
      letter-spacing: .18em; font-size: .66rem; background: rgba(255,255,255,.02); }
    #rides-menu button.city:hover { color: var(--accent); }
    #rides-menu button.ride { padding-left: 1.4rem; }
    #rides-menu button.ride:hover { color: var(--accent); }

    /* --- current-position arrow (screen-space, sized + rotated by JS to the
       compass direction the 360 view faces). White so it pops against the
       teal/gold route. ----------------------------------------------------- */
    #pos-dot { position: absolute; z-index: 40; display: none;
      border-radius: 50%; background: rgba(5, 7, 13, .82);
      border: 2px solid rgba(255, 255, 255, .95);
      box-shadow: 0 0 12px rgba(34, 230, 200, .8), 0 2px 6px rgba(0, 0, 0, .6);
      transform: translate(-50%, -50%); pointer-events: none; }
    #pos-arrow { position: absolute; left: 18%; top: 14%; width: 64%;
      height: 64%; background: var(--accent);
      clip-path: polygon(50% 0%, 88% 100%, 50% 74%, 12% 100%);
      filter: drop-shadow(0 0 2px rgba(34, 230, 200, .9)); }

    /* ---------------- ride box chrome (over the map, ride view only) ------ */
    #rb-bar, #rb-foot { display: none; }
    #stage.ride #rb-bar { display: flex; position: absolute; top: 0; left: 0;
      right: 0; z-index: 45; justify-content: space-between; align-items: center;
      gap: .6rem; padding: .5rem .45rem .5rem .7rem; }
    #stage.ride #rb-foot { display: flex; position: absolute; bottom: 0; left: 0;
      right: 0; z-index: 45; flex-direction: column; gap: .5rem;
      padding: .55rem .7rem; }
    #rb-title { min-width: 0; }
    #rb-title b { display: block; font-size: .72rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #rb-title span { font-size: .62rem; color: var(--dim); letter-spacing: .12em; }
    #rb-close { background: none; border: 1px solid var(--line); color: var(--dim);
      font: inherit; font-size: .8rem; line-height: 1; width: 1.7rem; height: 1.7rem;
      cursor: pointer; flex: none; }
    #rb-close:hover { color: var(--accent); border-color: var(--accent); }
    #rb-row { display: flex; justify-content: space-between; align-items: flex-end;
      gap: .6rem; }
    #hud { display: flex; gap: 1rem; font-size: .6rem; letter-spacing: .08em;
      color: var(--dim); }
    #hud b { display: block; font-size: .82rem; font-weight: 500;
      color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; }
    #hud .u { color: var(--dim); font-size: .58rem; }
    #rb-controls { display: flex; gap: .6rem; align-items: center; }
    /* zoom cluster: same idiom as the 360-viewer navbar zoom (icons + slider),
       but chromeless — no dark plate behind it */
    #rb-zoom { display: flex; align-items: center; gap: .35rem; }
    #rb-zoom button { background: none; border: none; color: var(--ink);
      font: inherit; font-size: .95rem; line-height: 1; cursor: pointer;
      padding: .2rem .15rem; }
    #rb-zoom button:hover { color: var(--accent); }
    #rb-zoom-range { -webkit-appearance: none; appearance: none; width: 74px;
      height: 2px; background: rgba(255, 255, 255, .35); outline: none;
      cursor: pointer; }
    #rb-zoom-range::-webkit-slider-thumb { -webkit-appearance: none;
      appearance: none; width: 9px; height: 9px; border-radius: 50%;
      background: #fff; border: none; }
    #rb-zoom-range::-moz-range-thumb { width: 9px; height: 9px;
      border-radius: 50%; background: #fff; border: none; }
    /* pop-into-box toggle: bottom right of the ride box, beside the zoom */
    #rb-pop { background: rgba(5, 7, 13, .55); border: 1px solid var(--line);
      color: var(--dim); font: inherit; font-size: .8rem; line-height: 1;
      width: 1.7rem; height: 1.7rem; cursor: pointer; flex: none;
      display: none; }
    #rb-pop:hover { color: var(--accent); border-color: var(--accent); }
    @media (min-width: 821px) { #stage.ride #rb-pop { display: block; } }
    /* videos button: top center of the ride box; its menu drops from it */
    #segments-btn { display: none; position: absolute; top: .45rem; left: 50%;
      z-index: 46; transform: translateX(-50%);
      background: rgba(5, 7, 13, .55); border: 1px solid var(--line);
      color: var(--dim); font: inherit; font-size: .66rem; letter-spacing: .12em;
      padding: .35rem .6rem; cursor: pointer; text-transform: uppercase;
      white-space: nowrap; }
    #stage.ride #segments-btn { display: block; }
    #segments-btn:hover, #segments-btn.open { color: #ffc65c;
      border-color: #ffc65c; }
    #segments-menu { position: absolute; z-index: 47; top: 2.8rem; left: 50%;
      transform: translateX(-50%);
      background: rgba(5, 7, 13, .94); border: 1px solid var(--line);
      max-height: 65%; overflow-y: auto; min-width: 12rem; }
    #segments-menu button { display: flex; justify-content: space-between; gap: 1.2rem;
      width: 100%; background: none; border: none; border-bottom: 1px solid #10161f;
      color: var(--ink); font: inherit; font-size: .72rem; letter-spacing: .08em;
      padding: .55rem .8rem; cursor: pointer; text-align: left;
      font-variant-numeric: tabular-nums; }
    #segments-menu button:hover { color: #ffc65c; }
    #segments-menu button.active { color: #ffc65c; }
    #segments-menu button .dur { color: var(--dim); }

    /* -------- desktop ride view: map is a resizable side panel, with an
       optional pop-out into a floating, movable, resizable box ------------- */
    @media (min-width: 821px) {
      #stage.ride { grid-template-columns: var(--panel-w, 25%) 1fr; }
      #stage.ride #globe-pane { border-right: 1px solid #24334a; }
      #stage.ride #rb-bar {
        background: linear-gradient(rgba(5, 7, 13, .92), rgba(5, 7, 13, 0));
        padding-bottom: 1.2rem; }
      #stage.ride #rb-foot {
        background: linear-gradient(rgba(5, 7, 13, 0), rgba(5, 7, 13, .96) 70%);
        padding-top: 1.3rem; }
      #stage.ride #panel-grip { position: absolute; top: 0; bottom: 0;
        right: -4px; width: 9px; cursor: col-resize; z-index: 70; }
      #stage.ride #panel-grip:hover { background: rgba(34, 230, 200, .18); }
      /* floating box mode */
      #stage.ride.float { display: block; position: relative; }
      #stage.ride.float #viewer-pane { position: absolute; inset: 0; }
      /* above PSV's overlays (z 110), which join the root stacking context */
      #stage.ride.float #globe-pane { position: absolute; z-index: 130;
        border: 1px solid #24334a; box-shadow: 0 12px 48px rgba(0, 0, 0, .65);
        background: var(--bg); resize: both; overflow: hidden;
        min-width: 280px; min-height: 240px; max-width: 70vw; max-height: 85vh; }
      #stage.ride.float #panel-grip { display: none; }
      #stage.ride.float #rb-bar { cursor: move; }
    }

    /* settings + hint (landing views only) */
    #settings { position: absolute; right: 1.2rem; bottom: 1.2rem; z-index: 12;
      background: none; border: 1px solid var(--line); color: var(--dim);
      font-size: .95rem; width: 2.2rem; height: 2.2rem; cursor: pointer; }
    #settings:hover { color: var(--accent); border-color: var(--accent); }
    #settings-menu { position: absolute; right: 1.2rem; bottom: 3.8rem; z-index: 12;
      background: rgba(5, 7, 13, .92); border: 1px solid var(--line);
      padding: .8rem 1rem; min-width: 11rem; }
    #settings-menu .row { display: flex; align-items: center; gap: 1rem;
      justify-content: space-between; }
    #settings-menu .lbl { font-size: .68rem; color: var(--dim);
      letter-spacing: .16em; text-transform: uppercase; }
    #settings-menu .seg button { background: none; border: 1px solid var(--line);
      color: var(--dim); font: inherit; font-size: .72rem; padding: .35rem .7rem;
      cursor: pointer; }
    #settings-menu .seg button.active { color: var(--accent);
      border-color: var(--accent); }
    #stage.ride #settings, #stage.ride #settings-menu { display: none; }

    #hint { position: absolute; left: 50%; bottom: 1.4rem; z-index: 10;
      transform: translateX(-50%); font-size: .7rem; letter-spacing: .18em;
      color: var(--dim); text-transform: uppercase; }
    #stage.ride #hint, #stage.city #hint { display: none; }

    /* PSV overrides to match the theme; zoom + pan/tilt arrows centered in
       the bottom bar, fullscreen pinned right */
    .psv-container { background: var(--bg) !important; }
    .psv-navbar { background: rgba(5, 7, 13, .72); justify-content: center; }
    .psv-fullscreen-button { position: absolute !important; right: 0; top: 0; }

    /* street-view stepping controls over the 360 pane */
    /* z-index above PSV's loader/error overlays so controls always work */
    #tl-cluster { position: absolute; top: .7rem; left: .7rem; z-index: 120;
      display: flex; gap: .4rem; align-items: stretch; }
    #mode-toggle { display: flex; }
    #mode-toggle button { background: rgba(5, 7, 13, .55); border: 1px solid var(--line);
      color: var(--dim); font: inherit; font-size: .68rem; letter-spacing: .14em;
      text-transform: uppercase; padding: .45rem .7rem; cursor: pointer;
      white-space: nowrap; }
    /* overlap the shared edge; the active button's border wins on top so a
       gold VIDEO keeps all four edges */
    #mode-toggle button + button { margin-left: -1px; }
    #mode-toggle button.active { position: relative; z-index: 1; }
    #mt-photo.active { color: var(--accent); border-color: var(--accent); }
    #mt-video.active { color: #ffc65c; border-color: #ffc65c; }
    #mode-toggle button:disabled { opacity: .35; cursor: default; }
    /* play/pause: left side of the main (navbar) bar, styled like the other
       navbar buttons (plain glyph, no chrome) */
    #play-toggle { position: absolute; left: 0; bottom: 0; z-index: 120;
      width: 40px; height: 40px; background: none; border: none;
      color: rgba(255, 255, 255, .7); font: inherit; font-size: 1.2rem;
      line-height: 40px; padding: 0; cursor: pointer; }
    #play-toggle:hover { color: #fff; }
    /* forward = up (top), back = down (bottom): stepping follows the path */
    .step-btn { position: absolute; left: 50%; z-index: 120;
      transform: translateX(-50%); width: 3.6rem; height: 2.3rem;
      background: rgba(5, 7, 13, .45); border: 1px solid var(--line);
      color: var(--ink); font-size: 1.15rem; line-height: 1; cursor: pointer; }
    .step-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
    .step-btn:disabled { opacity: .25; cursor: default; }
    #step-next { top: .7rem; }
    #step-prev { bottom: 3.4rem; } /* clears the PSV navbar */
    /* shown on photo stops that sit inside a video segment */
    #play-video { position: absolute; left: 50%; top: 50%; z-index: 120;
      transform: translate(-50%, -50%); width: 4.2rem; height: 4.2rem;
      border-radius: 50%; display: none; cursor: pointer;
      background: rgba(5, 7, 13, .55); border: 1px solid #ffc65c;
      color: #ffc65c; font-size: 1.4rem; line-height: 1; }
    #play-video:hover { background: rgba(255, 198, 92, .18); }
    /* heading + other-pass toggle: arrow shows current travel direction;
       tapping jumps to the same spot on the opposite leg */
    #dir-toggle { position: absolute; top: .7rem; right: .7rem; z-index: 120;
      display: flex; align-items: center; gap: .45rem;
      background: rgba(5, 7, 13, .55); border: 1px solid var(--line);
      color: var(--ink); font: inherit; font-size: .72rem; letter-spacing: .12em;
      padding: .45rem .7rem; cursor: pointer; text-transform: uppercase; }
    #dir-toggle:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
    #dir-toggle:disabled { opacity: .35; cursor: default; }
    #dir-arrow { display: inline-block; color: var(--accent);
      transition: transform .3s; font-size: .9rem; }
    #dir-toggle .swap { color: var(--dim); font-size: .8rem; }
    /* during video segments the arrows recede but stay usable */
    #step-nav.video .step-btn { opacity: .35; }
    #step-nav.video .step-btn:hover:not(:disabled) { opacity: 1; }

    /* phones: stack globe above viewer in ride mode (unchanged layout) */
    @media (max-width: 820px) {
      #stage.ride { grid-template-columns: 1fr; grid-template-rows: 34% 1fr; }
      #stage.ride #viewer-pane { border-top: 1px solid #10161f; }
      #stage.ride #rb-bar { background: linear-gradient(rgba(5, 7, 13, .85), rgba(5, 7, 13, 0)); }
      #stage.ride #rb-foot { background: linear-gradient(rgba(5, 7, 13, 0), rgba(5, 7, 13, .85)); }
      #rb-row { flex-wrap: wrap; }
      header { padding: .9rem 1rem; }
      header .sub { max-width: 42vw; overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; }
      #nav-cluster { right: 1rem; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="globe-pane">
      <header><h1>Rides</h1><span class="sub" id="sub"></span></header>
      <div id="globe"></div>
      <div id="pos-dot"><span id="pos-arrow"></span></div>

      <div id="nav-cluster">
        <button id="back" hidden>← world</button>
        <button id="menu-btn">☰ all rides</button>
      </div>
      <div id="rides-menu" hidden></div>

      <!-- ride box chrome: title bar + stats/controls footer -->
      <div id="rb-bar">
        <div id="rb-title"><b id="rb-name"></b><span id="rb-date"></span></div>
        <button id="rb-close" title="close — back to city">✕</button>
      </div>
      <div id="panel-grip"></div>
      <div id="rb-foot">
        <div id="rb-row">
          <div id="hud">
            <div><b id="hud-time">0:00</b><span class="u">elapsed</span></div>
            <div><b id="hud-speed">–</b><span class="u" id="hud-speed-u">km/h</span></div>
            <div><b id="hud-dist">–</b><span class="u" id="hud-dist-u">km</span></div>
          </div>
          <div id="rb-controls">
            <span id="rb-zoom">
              <button id="rb-zoom-out" title="zoom out">−</button>
              <input id="rb-zoom-range" type="range" min="0" max="100" value="0"
                title="zoom — follows position when zoomed in" />
              <button id="rb-zoom-in" title="zoom in — follows position">+</button>
            </span>
            <button id="rb-pop" title="pop map into a box / back to panel">⧉</button>
          </div>
        </div>
      </div>
      <button id="segments-btn" title="video segments">▤ videos</button>
      <div id="segments-menu" hidden></div>

      <button id="settings" title="settings">⚙</button>
      <div id="settings-menu" hidden>
        <div class="row">
          <span class="lbl">units</span>
          <span class="seg">
            <button id="unit-km">km</button><button id="unit-mi">mi</button>
          </span>
        </div>
      </div>
      <div id="hint">select a ride</div>
    </div>
    <div id="viewer-pane">
      <div id="viewer"></div>
      <div id="step-nav">
        <div id="tl-cluster">
          <div id="mode-toggle">
            <button id="mt-photo">◈ photo</button>
            <button id="mt-video">● video</button>
          </div>
        </div>
        <button id="play-toggle" hidden>▶</button>
        <button id="step-next" class="step-btn" title="forward (↑)">↑</button>
        <button id="step-prev" class="step-btn" title="back (↓)">↓</button>
        <button id="play-video" title="play video here">▶</button>
        <button id="dir-toggle" title="switch direction">
          <span id="dir-arrow">➤</span><span id="dir-card">–</span><span class="swap">⇄</span>
        </button>
      </div>
    </div>
  </div>
  <!-- absolute URL of external media storage (R2 bucket); empty = same-origin media/ for local dev -->
  <script>window.MEDIA_BASE = 'https://pub-4babb845498a448eb956f3048537e138.r2.dev/';</script>
  <script type="module" src="dist/app.js"></script>
</body>
</html>
